<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>templates/post/list.html</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <a href="/post/new" class="btn btn-primary mb-3">새글작성</a>
        <h3>글목록</h3>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>작성자</th>
                    <th>제목</th>
                    <th>내용</th>
                    <th>작성일</th>
                    <th>삭제</th>
                    <th>수정</th>
                    <th>테스트삭제</th>
                </tr>
            </thead>
            <tbody>
                {% for post in posts %}
                <tr>
                    <td>{{ post.num }}</td>
                    <td>{{ post.writer }}</td>
                    <td>
                        <a href="/post/{{ post.num }}">{{ post.title }}</a>
                    </td>
                    <td style="text-align: left;">{{ post.content[:50] }}...</td>
                    <td>{{ post.created_at.strftime('%Y-%m-%d') if post.created_at else '' }}</td>
                    
                      <td>
                        <a href="/post/edit/{{ post.num }}">수정</a>
                    </td>
                    <td>
                        <a href="/post/delete/{{ post.num }}">삭제</a>
                    </td>
                    <td>
                        <!-- 모달 없이 바로 삭제 -->
                        <form method="post" action="/post/delete/{{ post.num }}" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
                {% if not posts %}
                <tr>
                    <td colspan="6">게시글이 없습니다.</td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
