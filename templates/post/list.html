<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>templates/post/list.html</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #333; /* 테이블 선 추가 */
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/post/new">새글목록</a>
        <h3>글목록</h3>
        <table>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>작성자</th>
                    <th>제목</th>
                    <th>내용</th>
                    <th>작성일</th>
                </tr>
            </thead>
            <tbody>
                {% for post in posts %}
                <tr>
                    <td>{{ post.num }}</td> <!-- id 대신 num 사용 -->
                    <td>{{ post.writer }}</td> <!-- author 대신 writer 사용 -->
                    <td>
                        <a href="/post/{{ post.num }}">{{ post.title }}</a>
                    </td>
                    <td style="text-align: left;">{{ post.content[:50] }}...</td>
                    <td>{{ post.created_at.strftime('%Y-%m-%d') if post.created_at else '' }}</td>
                </tr>
                {% endfor %}
                {% if not posts %}
                <tr>
                    <td colspan="5">게시글이 없습니다.</td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</body>
</html>
