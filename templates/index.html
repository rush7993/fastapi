<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>index.html</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <a href="/post" class="btn btn-link">글목록</a>
    <h1>Welcome to My 인덱스페이지</h1>
    <p>{{fortuneToday}}</p>

    <!-- 삭제 버튼 -->
    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal">
      삭제
    </button>
  </div>

  <!-- 확인 모달 -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="deleteModalLabel">게시물 삭제</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
        </div>
        <div class="modal-body">
          정말로 이 게시물을 삭제하시겠습니까?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">아니오</button>
          <button type="button" class="btn btn-danger" id="confirmDelete">예</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (필수: 모달 동작) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById("confirmDelete").addEventListener("click", async () => {
      try {
        const response = await fetch("/api/posts/123", { // 실제 postId로 교체 필요
          method: "DELETE",
        });
        if (response.ok) {
          alert("게시물이 삭제되었습니다.");
          window.location.href = "/post"; // 글목록으로 이동
        } else {
          alert("삭제에 실패했습니다.");
        }
      } catch (error) {
        console.error(error);
        alert("에러가 발생했습니다.");
      }
    });
  </script>
</body>
</html>
